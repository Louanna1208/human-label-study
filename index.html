<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Label Hypothesis Study</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div class="container">
      <h1>Human Label Hypothesis Study</h1>
      <div id="status">Loading articles...</div>

      <div id="study" class="hidden">
        <div class="topbar">
          <span id="progress"></span>
          <button id="saveBtn" type="button">Save Progress</button>
        </div>

        <div class="card">
          <h2 id="title"></h2>
          <p id="abstract"></p>
        </div>

        <div class="card">
          <h3>Model 1 Summary</h3>
          <p id="model1"></p>
        </div>

        <div class="card">
          <h3>Model 2 Summary</h3>
          <p id="model2"></p>
        </div>

        <form id="labelForm">
          <div class="card">
            <h3>Your Label</h3>

            <label>
              Better summary:
              <select id="better_summary" required>
                <option value="">Select...</option>
                <option value="model1">Model 1</option>
                <option value="model2">Model 2</option>
                <option value="tie">Tie</option>
              </select>
            </label>

            <label>
              Confidence (1-5):
              <select id="confidence" required>
                <option value="">Select...</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>

            <label>
              Notes:
              <textarea id="notes" rows="5"></textarea>
            </label>
          </div>

          <div class="actions">
            <button type="submit">Submit and Next</button>
          </div>
        </form>
      </div>

      <div id="done" class="hidden">
        <h2>All done</h2>
        <p>Your responses have been submitted.</p>
      </div>
    </div>
  </div>

  <script src="task.js"></script>
</body>
</html>
