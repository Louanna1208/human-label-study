<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Label Hypothesis Study</title>
  <!-- Tailwind for consistent style with expert_evaluation.html -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Optional: keep custom overrides if needed -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app" class="min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
      <header class="mb-6 border-b border-slate-200 pb-4 flex flex-col gap-2 sm:flex-row sm:items-baseline sm:justify-between">
        <div>
          <h1 class="text-2xl font-black tracking-tight">Human Label Hypothesis Study</h1>
          <p class="text-sm text-slate-600 mt-1">
            For each paper, read the abstract and compare two anonymous model summaries.
          </p>
        </div>
        <div class="text-sm text-slate-500">
          <span id="progress" class="font-semibold"></span>
        </div>
      </header>

      <div id="status" class="mb-4 text-slate-600">
        Loading articles...
      </div>

      <main id="study" class="hidden space-y-4">
        <div class="flex flex-col-reverse gap-4 lg:grid lg:grid-cols-3 lg:items-start">
          <!-- Left: paper info -->
          <section class="lg:col-span-1 space-y-4">
            <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <h2 id="title" class="text-lg font-semibold mb-2"></h2>
              <p id="abstract" class="text-sm text-slate-700 leading-relaxed"></p>
            </article>
            <button
              id="saveBtn"
              type="button"
              class="w-full inline-flex items-center justify-center px-4 py-2.5 rounded-xl text-sm font-semibold bg-slate-900 text-white shadow-sm hover:bg-slate-800 active:scale-[0.99] transition">
              Save progress locally
            </button>
          </section>

          <!-- Right: model summaries + form -->
          <section class="lg:col-span-2 space-y-4">
            <div class="grid md:grid-cols-2 gap-4">
              <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">
                  Model 1 Summary
                </h3>
                <p id="model1" class="text-sm text-slate-800 leading-relaxed"></p>
              </article>

              <article class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">
                  Model 2 Summary
                </h3>
                <p id="model2" class="text-sm text-slate-800 leading-relaxed"></p>
              </article>
            </div>

            <form id="labelForm" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-4">
              <h3 class="text-base font-bold text-slate-800 mb-1">Your judgement</h3>

              <div class="space-y-1">
                <label for="better_summary" class="text-sm font-medium text-slate-800">
                  Which summary better captures the paper?
                </label>
                <select
                  id="better_summary"
                  required
                  class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                >
                  <option value="">Select...</option>
                  <option value="model1">Model 1</option>
                  <option value="model2">Model 2</option>
                  <option value="tie">Tie (about equally good)</option>
                </select>
              </div>

              <div class="space-y-1">
                <label for="confidence" class="text-sm font-medium text-slate-800">
                  Confidence in your judgement (1–5)
                </label>
                <select
                  id="confidence"
                  required
                  class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                >
                  <option value="">Select...</option>
                  <option value="1">1 – very unsure</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5 – very sure</option>
                </select>
              </div>

              <div class="space-y-1">
                <label for="notes" class="text-sm font-medium text-slate-800">
                  Optional notes (e.g., why one summary is better)
                </label>
                <textarea
                  id="notes"
                  rows="4"
                  class="mt-1 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-y"
                ></textarea>
              </div>

              <div class="pt-2">
                <button
                  type="submit"
                  class="w-full inline-flex items-center justify-center px-4 py-3 rounded-xl text-sm font-semibold bg-indigo-600 text-white shadow-sm hover:bg-indigo-700 active:scale-[0.99] transition">
                  Submit and next
                </button>
              </div>
            </form>
          </section>
        </div>
      </main>

      <section id="done" class="hidden">
        <div class="bg-white rounded-2xl shadow-sm border border-emerald-200 p-8 mt-8 text-center">
          <h2 class="text-xl font-bold text-emerald-700 mb-2">All done</h2>
          <p class="text-sm text-slate-700">
            Thank you for completing the study. Your responses have been saved.
          </p>
        </div>
      </section>
    </div>
  </div>

  <script src="task.js"></script>
</body>
</html>
